[build]
  publish = "."

[[redirects]]
  from = "https://saasnova.ai/*"
  to = "https://www.saasnova.ai/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/shared.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/popup.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"
