<script>
// Smart redirect: handles .html → clean URL and old bookmarks
(function() {
  var path = window.location.pathname;
  // If someone lands on a .html URL, strip it and redirect
  if (path.endsWith('.html')) {
    var cleanPath = path.replace('.html', '');
    if (cleanPath === '/index') cleanPath = '/';
    window.location.replace(cleanPath);
    return;
  }
  // Otherwise just let the 5s meta refresh handle it
})();
</script>
