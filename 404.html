<script>
// GitHub Pages Clean URL Handler
// When GitHub Pages can't find a file, it serves 404.html
// This script checks if the URL matches a known page and redirects to the .html version
(function() {
  var path = window.location.pathname;
  var base = window.location.origin;

  // Strip leading slash and trailing slash
  var clean = path.replace(/^\//, '').replace(/\/$/, '');

  // If it already ends in .html, we have a real 404
  if (clean.endsWith('.html')) return;

  // Map of clean slugs to .html files
  var pages = {
    '': 'index.html',
    'index': 'index.html',
    'services': 'services.html',
    'ignite': 'ignite.html',
    'supernova': 'supernova.html',
    'novax': 'novax.html',
    'about': 'about.html',
    'partners': 'partners.html',
    'partner-aws-gtm': 'partner-aws-gtm.html',
    'partner-azure-gtm': 'partner-azure-gtm.html',
    'partner-gcp-gtm': 'partner-gcp-gtm.html',
    'partner-saasify': 'partner-saasify.html',
    'partner-workspan': 'partner-workspan.html',
    'partner-pronix': 'partner-pronix.html',
    'blog': 'blog.html',
    'blog-aws-alignment': 'blog-aws-alignment.html',
    'blog-aws-prm-deadline': 'blog-aws-prm-deadline.html',
    'blog-cloud-marketplace-listing-silent-fix': 'blog-cloud-marketplace-listing-silent-fix.html',
    'show': 'show.html',
    'case-study': 'case-study.html',
    'webinars': 'webinars.html',
    'newsletter': 'newsletter.html',
    'careers': 'careers.html',
    'contact': 'contact.html',
    'privacy': 'privacy.html',
    'terms': 'terms.html',
    'results': 'results.html',
  };

  // Handle GitHub Pages subpath (repo name in URL)
  // e.g. /saasnova/about -> clean = 'saasnova/about' -> strip repo prefix
  var parts = clean.split('/');
  var slug = parts[parts.length - 1];

  if (pages.hasOwnProperty(slug)) {
    // Reconstruct the base path (handles repo subdirectory on GitHub Pages)
    var basePath = window.location.pathname.replace(/[^\/]*$/, '');
    window.location.replace(basePath + pages[slug] + window.location.search + window.location.hash);
    return;
  }

  // Also try the full clean path as slug
  if (pages.hasOwnProperty(clean)) {
    window.location.replace(base + '/' + pages[clean] + window.location.search + window.location.hash);
    return;
  }

  // No match — show the 404 UI below
})();
</script>
</head>
<body>
<div id="nav-placeholder"></div>
<section style="margin-top:64px;min-height:80vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:var(--sp-10) var(--sp-3)">
  <div style="max-width:480px">
    <div style="font-family:'JetBrains Mono',monospace;font-weight:900;font-size:80px;line-height:1;background:linear-gradient(90deg,var(--blue),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:var(--sp-3)">404</div>
    <h2 style="margin-bottom:var(--sp-2)">Page not found.</h2>
    <p style="margin-bottom:var(--sp-5);color:var(--text-muted)">This page does not exist or has been moved.</p>
    <div style="display:flex;gap:var(--sp-2);justify-content:center;flex-wrap:wrap">
      <a href="index.html" class="btn btn-primary">Go to Homepage</a>
      <a href="contact.html" class="btn btn-secondary">Contact SaaSNova</a>
    </div>
  </div>
</section>
<div id="footer-placeholder"></div>
